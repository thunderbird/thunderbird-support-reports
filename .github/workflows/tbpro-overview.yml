name: Thundermail Launch Overview

on:
  schedule:
    - cron: '17 */6 * * *'  # every 6 hours at :17
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node (for featureos-cli)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install featureos-cli
        run: npm install -g @featureos/cli

      - name: Write FeatureOS credentials
        run: |
          printf 'api_key: %s\njwt: %s\n' \
            "${{ secrets.FEATUREOS_API_KEY }}" \
            "${{ secrets.FEATUREOS_JWT }}" \
            > ~/.featureos.yaml

      - name: Generate launch overview
        env:
          ZENDESK_EMAIL:     ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_TOKEN:     ${{ secrets.ZENDESK_TOKEN }}
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          FEATUREOS_API_KEY: ${{ secrets.FEATUREOS_API_KEY }}
          FEATUREOS_JWT:     ${{ secrets.FEATUREOS_JWT }}
          TZ: America/New_York
        run: |
          export ZENDESK_TOKEN="$(printf '%s' "$ZENDESK_TOKEN" | tr -d ' \t\r\n')"
          python3 scripts/tbpro_launch_overview.py --out lisa/daily/launch_overview.html

      - name: Commit and push
        run: |
          git config user.name "Moment"
          git config user.email "lisajill@users.noreply.github.com"
          git add lisa/daily/launch_overview.html
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Thundermail launch overview · $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
