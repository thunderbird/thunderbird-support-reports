name: Thundermail Daily Report

on:
  schedule:
    - cron: '7 * * * *'   # hourly at :07 UTC
  workflow_dispatch:       # also runnable on demand from the Actions tab

permissions:
  contents: write  # needed to commit the generated report

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node (for featureos-cli)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install featureos-cli
        run: npm install -g @featureos/cli

      - name: Write FeatureOS credentials
        run: |
          printf 'api_key: %s\njwt: %s\n' \
            "${{ secrets.FEATUREOS_API_KEY }}" \
            "${{ secrets.FEATUREOS_JWT }}" \
            > ~/.featureos.yaml

      - name: Generate Thundermail daily report
        env:
          ZENDESK_EMAIL:     ${{ secrets.ZENDESK_EMAIL }}
          ZENDESK_TOKEN:     ${{ secrets.ZENDESK_TOKEN }}
          ZENDESK_SUBDOMAIN: ${{ secrets.ZENDESK_SUBDOMAIN }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          TZ: America/New_York
        run: |
          export ZENDESK_TOKEN="$(printf '%s' "$ZENDESK_TOKEN" | tr -d ' \t\r\n')"
          python3 scripts/tbpro_daily.py --public --out-dir lisa/daily/

      - name: Commit and push
        run: |
          git config user.name "Moment"
          git config user.email "lisajill@users.noreply.github.com"
          git add lisa/daily/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Thundermail daily report · $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Retry to absorb transient remote rejections (e.g. "fatal error in commit_refs")
            # and races with concurrent hourly runs.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "Pushed on attempt $attempt."
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Push failed after $attempt attempts." >&2
                exit 1
              fi
              echo "Push attempt $attempt failed; rebasing on origin/main and retrying…"
              git pull --rebase origin main
              sleep $((attempt * 5))
            done
          fi
