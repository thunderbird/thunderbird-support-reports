# ── NARRATIVE (Claude drafts, Lisa edits) ───────────────────────────────────
narrative:
  lede: "Thundermail support matured significantly in May — 118 tickets at 92.9% CSAT, signaling the wave is landing well with subscribers. K-9 Mail staged a notable Play Store recovery, climbing from 2.96★ to 3.53★ as v17/v18 regression reports faded. Donor Support CSAT dipped to 66.7% (-10.3 pts MoM), but ticket-level review shows most bad ratings were misdirected contacts, wrong-channel requests, and measurement noise — with one actionable gap: German-language bank transfer documentation."
  report_note: ""

  receive_resolve_resound: |
    **🕊 Receive**
    - 606 Zendesk tickets (+17% MoM) — Thundermail volume growing with wave expansion; 445 Play Store reviews across 32 languages; 802 desktop forum questions (+9% MoM)

    **🪽 Resolve**
    - Thundermail 92.9% CSAT (both dissatisfied ratings (DSATs) were misdirected emails, remediated via thunderbird-accounts#834); desktop forum solved rate 70% (+6 pts); 209 low-star Play Store reviews replied to

    **✨ Resound**
    - K-9 recovered +0.57★ to 3.53★ as v17/v18 regression reports faded; push sync improving for the second consecutive month; Thundermail CSAT a strong signal for continued wave expansion

  sumo_desktop_signal: "Send/Receive issues dominant at 31% of volume (250 questions)"
  sumo_android_signal: "ignored rate jumped to 31% (from 22% in April)"
  goal_bullets: |
    - **Push / Notification Sync:** 32 negative mentions (down from 37) · improving for 2nd straight month · still the single largest drag on rating; TB at 3.74★, needs +0.26★ to reach goal
    - **Stuck Outbox / Send Failure:** 4 negative (up from 1 in April) · accelerating · K-9 now matching TB volume on this theme; watch for continuation in June
    - **K-9 rating baseline:** 3.53★ (recovered +0.57★ MoM) · sustaining this through the next release cycle is essential to maintaining combined rating progress

  experiments: ""
  whats_coming_up: |
    **Support team headcount (as of May 2026):**
    - 1 dedicated support agent focused on Thundermail subscriber tickets
    - Donor Support handled by an outsourced team
