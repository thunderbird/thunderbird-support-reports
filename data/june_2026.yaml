# ── METHODOLOGY FOOTNOTES (must appear in the June report) ──────────────────
# 1. Play Store: review data now pulled directly from the Play Console GCS export
#    bucket via scripts/fetch_reviews.py (previously manual UI downloads, Jan–May 2026).
#    Mobile manager approved this operational shift (July 2026). Count differences vs
#    prior months may reflect the source change, not real movement — e.g. May 493
#    (manual) vs June 360 (GCS).
# 2. SUMO: Mozilla gated the SUMO API behind JS; Roland's repo switched to concatenating
#    exported Q&A files. This recomputes numbers — even historical months differ from
#    what was previously reported. May is NOT restated here; June's SUMO MoM deltas carry
#    a methodology caveat (compare like-for-like against Roland's current figures, not the
#    originally-published May numbers).
methodology_approved_by: mobile manager  # Play Store GCS shift — approved July 2026
methodology_notes:
  - "Play Store (June 2026+): review CSVs fetched automatically from the Play Console GCS export bucket via scripts/fetch_reviews.py — replacing manual Play Console UI downloads used Jan–May 2026. Approved operational improvement. Review counts and monthly averages may differ from prior months partly due to this source change (e.g. May 493 manual vs June 360 GCS), not necessarily real volume movement; MoM comparisons spanning the boundary carry a methodology caveat."
  - "SUMO figures use Roland's new concatenation method (the SUMO API was gated behind JS). This recomputes values; May is not restated, so SUMO month-over-month carries a methodology caveat."

